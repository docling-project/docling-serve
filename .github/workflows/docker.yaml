name: Docker Build Publish

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  release:
    types:
      - published
permissions: {}

jobs:
  build:
    name: Build amd64
    permissions:
      actions: read
      contents: read
      checks: write
      id-token: write
      security-events: write
    uses: ./.github/workflows/_docker-build.yaml
    with:
      image-name: onebrief/docling-ob
      dockerfile: Dockerfile
      context: .
      provenance: false
    secrets: inherit