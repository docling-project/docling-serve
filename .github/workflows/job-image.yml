name: Build docling-serve container image

on:
  workflow_call:
    inputs:
      build_args:
        type: string
        description: "Extra build arguments for the build."
        default: ""
      ghcr_image_name:
        type: string
        description: "Name of the image for GHCR."
      quay_image_name:
        type: string
        description: "Name of the image Quay."
      platforms:
        type: string
        description: "Platform argument for building images."
        default: linux/amd64, linux/arm64
      publish:
        type: boolean
        description: "If true, the images will be published."
        default: false
      tag_latest:
        type: boolean
        description: "If true, the 'latest' tag will be applied to the image."
        default: true
      environment:
        type: string
        description: "GH Action environment"
        default: ""

env:
  GHCR_REGISTRY: ghcr.io
  QUAY_REGISTRY: quay.io

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    environment: ${{ inputs.environment }}

    steps:
      - name: Free up space in github runner
        # Free space as indicated here : https://github.com/actions/runner-images/issues/2840#issuecomment-790492173
        run: |
            df -h
            sudo rm -rf "/usr/local/share/boost"
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
            sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
            # shellcheck disable=SC2046
            sudo docker rmi "$(docker image ls -aq)" >/dev/null 2>&1 || true
            df -h

      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Log in to the GHCR container image registry
        # Always log in: dry-runs need read access to the registry buildcache
        # populated by main, and the GITHUB_TOKEN has read-only on fork PRs
        # which is sufficient.
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to the Quay container image registry
        if: ${{ inputs.publish }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.QUAY_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for image
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR is always listed; Quay is added only when publishing.
          # An empty line is tolerated by metadata-action.
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ inputs.ghcr_image_name }}
            ${{ inputs.publish && format('{0}/{1}', env.QUAY_REGISTRY, inputs.quay_image_name) || '' }}
          flavor: |
            latest=${{ inputs.tag_latest }}

      - name: Build and push image
        id: image_push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.publish }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          # Registry cache: GHCR has no 10GB quota, unlike type=gha which
          # was evicting blobs mid-run and forcing full rebuilds. Only main
          # writes the cache (publish=true); PR dry-runs read from it.
          cache-from: type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ inputs.ghcr_image_name }}-buildcache
          cache-to: ${{ inputs.publish && format('type=registry,ref={0}/{1}-buildcache,mode=max', env.GHCR_REGISTRY, inputs.ghcr_image_name) || '' }}
          file: Containerfile
          build-args: ${{ inputs.build_args }}
          pull: true
      ##
      ## This stage runs after the build, so it leverages all build cache.
      ## Read-only against the same scope: no cache-to to avoid a second writer.
      ##
      - name: Export built image for testing
        id: image_export_test
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.GHCR_REGISTRY }}/${{ inputs.ghcr_image_name }}:${{ github.sha }}-test
          labels: |
            org.opencontainers.image.title=docling-serve
            org.opencontainers.image.test=true
          platforms: linux/amd64 # 'load' requires a single platform
          cache-from: type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ inputs.ghcr_image_name }}-buildcache
          file: Containerfile
          build-args: ${{ inputs.build_args }}

      - name: Test image
        if: steps.image_export_test.outcome == 'success'
        run: |
          set -e

          IMAGE_TAG="${{ env.GHCR_REGISTRY }}/${{ inputs.ghcr_image_name }}:${{ github.sha }}-test"
          echo "Testing local image: $IMAGE_TAG"

          # Remove existing container if any
          docker rm -f docling-serve-test-container 2>/dev/null || true

          echo "Starting container..."
          docker run -d -p 5001:5001 --name docling-serve-test-container "$IMAGE_TAG"

          echo "Waiting 15s for container to boot..."
          sleep 15

          # Health check
          echo "Checking service health..."
          for i in {1..20}; do
            HEALTH_RESPONSE=$(curl -s http://localhost:5001/health || true)
            echo "Health check response [$i]: $HEALTH_RESPONSE"

            if echo "$HEALTH_RESPONSE" | grep -q '"status":"ok"'; then
              echo "Service is healthy!"

              # Install pytest and dependencies
              echo "Installing pytest and dependencies..."
              pip install uv
              uv venv --allow-existing
              source .venv/bin/activate
              uv sync --only-dev

              # Run pytest tests
              echo "Running tests..."
              # Run pytest and check result directly
              if ! pytest -sv -k "test_convert_url" tests/test_1-url-async.py \
                --disable-warnings; then
                echo "Tests failed!"
                docker logs docling-serve-test-container
                docker rm -f docling-serve-test-container
                exit 1
              fi

              echo "Tests passed successfully!"
              break
            else
              echo "Waiting for service... [$i/20]"
              sleep 3
            fi
          done

          # Final health check if service didn't pass earlier
          if ! echo "$HEALTH_RESPONSE" | grep -q '"status":"ok"'; then
            echo "Service did not become healthy in time."
            docker logs docling-serve-test-container
            docker rm -f docling-serve-test-container
            exit 1
          fi

          # Cleanup
          echo "Cleaning up test container..."
          docker rm -f docling-serve-test-container
          echo "Cleaning up test image..."
          docker rmi "$IMAGE_TAG"

      - name: Generate artifact attestation for GHCR
        if: ${{ inputs.publish }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.GHCR_REGISTRY }}/${{ inputs.ghcr_image_name }}
          subject-digest: ${{ steps.image_push.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation for Quay
        if: ${{ inputs.publish }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.QUAY_REGISTRY }}/${{ inputs.quay_image_name }}
          subject-digest: ${{ steps.image_push.outputs.digest }}
          push-to-registry: true

      - name: Remove local Docker images
        run: |
          docker image prune -af
